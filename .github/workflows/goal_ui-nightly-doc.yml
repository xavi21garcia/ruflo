# goal_ui-nightly-doc.yml — Phase R-7.2 of the goal_ui RuFlo platform
# integration (per ADR-100). Runs the @claude-flow/cli `document` worker
# every night against the goal_ui source tree, regenerates UI/workflow
# inventory docs, and auto-PRs the diff via peter-evans/create-pull-request.
#
# Schedule: 03:07 UTC daily (off-minute per scheduler best practices —
# avoids the worldwide :00/:30 thundering-herd).
#
# Also supports workflow_dispatch for one-shot manual runs (useful when
# this workflow itself is being modified — verifies the cron path
# without waiting for the next nightly fire).

name: goal_ui — nightly document worker (auto-PR)

on:
  schedule:
    - cron: '7 3 * * *'   # 03:07 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    working-directory: v3/goal_ui

jobs:
  document:
    name: regenerate inventory docs + open PR if diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: v3/goal_ui/package-lock.json
      - name: Install goal_ui deps
        run: npm ci --no-fund --no-audit
      - name: Run document worker + regenerate inventory
        # `regenerate-docs.sh` invokes `npx @claude-flow/cli hooks worker
        # dispatch --trigger document` and ensures the inventory files
        # carry an updated "Last regenerated" footer so the diff is
        # never empty on the very first run (the DoD's "first nightly
        # run produces a PR" requirement).
        run: bash scripts/regenerate-docs.sh
      - name: Open PR if diff non-empty
        uses: peter-evans/create-pull-request@v6
        with:
          # peter-evans/create-pull-request operates from the repo root
          # by default — it'll detect changes anywhere in the tree.
          base: main
          branch: chore/goal_ui-nightly-doc-regen
          delete-branch: true
          commit-message: 'chore(goal_ui): nightly document-worker regen'
          title: 'chore(goal_ui): nightly inventory regen'
          body: |
            Auto-generated by `.github/workflows/goal_ui-nightly-doc.yml`
            (R-7.2 / ADR-100).

            Re-runs the `document` worker against `v3/goal_ui/` and
            captures the diff in `docs/ui-inventory.md` and
            `docs/workflow-inventory.md`. Review the diff before
            merging — auto-generated docs occasionally need manual
            tweaks for accuracy.

            *If this PR keeps getting noisily reopened with trivial
            timestamp-only diffs, tune `regenerate-docs.sh` to skip
            the footer when the worker output is unchanged.*
          labels: |
            documentation
            automated
