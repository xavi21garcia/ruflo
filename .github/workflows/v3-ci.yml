    # ADR-095 G2.2 regression guard — asserts the hive-mind MCP layer wires
    # the real `@claude-flow/swarm` ConsensusEngine via hive-consensus-runtime.
    #
    # Before this wire-up, `hive-mind_init` was a JSON file write and
    # `hive-mind_consensus` was a hand-rolled state machine — the real
    # `ConsensusEngine` (Raft/PBFT/Gossip + pluggable transport) shipped in
    # @claude-flow/swarm but was never reached from the CLI. This smoke
    # drives `hive-mind_init` → `hive-mind_consensus { action: 'engine-stats' }`
    # → `hive-mind_consensus { action: 'propose', useEngine: true }` → shutdown
    # through the actual MCP tool handlers and asserts each step actually
    # routes through the engine (`runtime.engine === 'enabled'`,
    # `transport === 'local'`, `propose.engine === 'enabled'`,
    # `shutdown.runtimeShutdown === true`).
    #
    # If a future refactor accidentally unhooks the runtime — e.g. by
    # short-circuiting `hive-mind_init` to skip `hiveConsensusRuntime.init`,
    # or by dropping the `useEngine` proxy from `hive-mind_consensus` — this
    # job catches it before merge.
    name: hive-mind consensus engine wire-up smoke (#1872, ADR-095 G2.2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
